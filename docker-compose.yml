services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: reviewpulse
      POSTGRES_PASSWORD: reviewpulse
      POSTGRES_DB: reviewpulse
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewpulse -d reviewpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
